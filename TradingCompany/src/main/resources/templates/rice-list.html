<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Rice List</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">

<style>
body {
	background: #f4f7fc;
}

.table-card {
	border-radius: 15px;
	background: white;
	padding: 20px;
	box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
}

.table th {
	background: #2e7d32;
	color: white;
}
</style>
</head>

<body>

	<!-- Navbar -->
	<nav class="navbar navbar-dark bg-success px-4">
		<span class="navbar-brand">🌾 Rice Trading</span>

		<div>
			<a href="/dashboard" class="btn btn-light btn-sm">Dashboard</a> <a
				href="/rice/add" class="btn btn-success mb-3">➕ Add Rice</a>
		</div>
	</nav>

	<div class="container mt-5">

		<div class="table-card">

			<h4 class="mb-4">📋 Rice List</h4>

			<table class="table table-bordered table-hover">

				<thead>
					<tr>
						<th>ID</th>
						<th>Rice Name</th>
						
					</tr>
				</thead>

				<tbody>
					<tr th:each="rice : ${riceList}">
						<td th:text="${rice.id}"></td>
						<td th:text="${rice.name}"></td>
						
					</tr>
				</tbody>

			</table>

		</div>

	</div>

</body>
</html>
