<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Rice Trading System - Admin Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                        url('https://images.unsplash.com/photo-1586201375761-83865001e31c') no-repeat center center/cover;
            height: 100vh;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.15); /* glass effect */
            backdrop-filter: blur(12px);
            border-radius: 15px;
            padding: 35px;
            box-shadow: 0px 8px 25px rgba(0,0,0,0.4);
            color: white;
        }

        .title {
            font-weight: 600;
        }

        .subtitle {
            font-size: 14px;
            color: #ddd;
        }

        .form-control {
            border-radius: 8px;
            background: rgba(255,255,255,0.85);
        }

        .btn-login {
            background-color: #28a745;
            border: none;
            font-weight: 500;
            border-radius: 8px;
        }

        .btn-login:hover {
            background-color: #218838;
        }

        .logo {
            font-size: 40px;
        }

        label {
            font-size: 14px;
        }

        .footer-text {
            color: #ddd;
        }
    </style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="col-md-4">
        <div class="login-card">

            <!-- Header -->
            <div class="text-center mb-4">
                <div class="logo">🌾</div>
                <h3 class="title">Rice Trading System</h3>
                <p class="subtitle">Admin Login Panel</p>
            </div>

            <!-- Login Form -->
            <form th:action="@{/login}" method="post">

                <!-- CSRF -->
                <!-- 
                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}" />
                 -->
                <!-- Username -->
                <div class="mb-3">
                    <label>Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Enter username" required>
                </div>

                <!-- Password -->
                <div class="mb-3">
                    <label>Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                </div>

                <!-- Button -->
                <button type="submit" class="btn btn-login w-100 mt-2">
                    Login
                </button>

            </form>

            <!-- Footer -->
            <div class="text-center mt-3">
                <small class="footer-text">© 2026 Rice Trading System</small>
            </div>

        </div>
    </div>

</div>

</body>
</html>
