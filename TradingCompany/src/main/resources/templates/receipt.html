<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Rice Sales Receipt</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">

<style>
body {
	background: #f4f7fc;
	font-family: Arial, sans-serif;
}

.receipt-card {
	max-width: 700px;
	margin: 40px auto;
	border-radius: 15px;
	border: none;
}

.receipt-header {
	background: #0d6efd;
	color: white;
	padding: 20px;
	border-radius: 15px 15px 0 0;
	text-align: center;
}

.receipt-body {
	padding: 25px;
}

.table td {
	padding: 12px;
	vertical-align: middle;
}

.footer-text {
	text-align: center;
	font-size: 14px;
	color: gray;
	margin-top: 20px;
}

@media print {
	body {
		background: white;
	}
	.no-print {
		display: none !important;
	}
	.receipt-card {
		box-shadow: none !important;
		margin: 0;
		width: 100%;
	}
}
</style>

</head>
<body>

	<div class="container">

		<div class="card shadow receipt-card">

			<!-- Header -->
			<div class="receipt-header">
				<h2>🧾 Rice Sales Receipt</h2>
				<p class="mb-0">Trading Company Management System</p>
			</div>

			<!-- Body -->
			<div class="receipt-body">

				<table class="table table-bordered">

					<tr>
						<td width="35%"><strong>Receipt ID</strong></td>
						<td th:text="${sale.id}"></td>
					</tr>

					<tr>
						<td><strong>Customer Name</strong></td>
						<td th:text="${sale.customerName}"></td>
					</tr>

					<tr>
						<td><strong>Rice Name</strong></td>
						<td th:text="${sale.riceStock.rice.name}"></td>
					</tr>

					<tr>
						<td><strong>Bag Size</strong></td>
						<td th:text="${sale.riceStock.bagSize}"></td>
					</tr>

					<tr>
						<td><strong>Bags Sold</strong></td>
						<td th:text="${sale.bagsSold}"></td>
					</tr>

					<tr>
						<td><strong>Price Per Bag</strong></td>
						<td>₹ <span th:text="${sale.riceStock.price}"></span>
						</td>
					</tr>

					<tr>
						<td><strong>Total Amount</strong></td>
						<td class="fw-bold text-success">₹ <span
							th:text="${sale.totalAmount}"></span>
						</td>
					</tr>

					<tr>
						<td><strong>Date</strong></td>
						<td th:text="${#temporals.format(sale.date,'dd-MM-yyyy')}"></td>
					</tr>

					<tr>
						<td><strong>Time</strong></td>
						<td th:text="${#temporals.format(sale.date,'hh:mm a')}"></td>
					</tr>

					<tr>
						<td><strong>Payment Status</strong></td>
						<td><span class="badge bg-success"
							th:text="${sale.paymentStatus}"> </span></td>
					</tr>

				</table>

				<div class="text-center mt-4 no-print">

					<button onclick="window.print()" class="btn btn-primary me-2">
						🖨 Print Receipt</button>

					<a href="/sales/list" class="btn btn-secondary"> ⬅ Back </a>

				</div>

				<div class="footer-text">
					<hr>
					<p>Thank You For Your Purchase 🙏</p>
					<p>Please Visit Again</p>
				</div>

			</div>

		</div>

	</div>

</body>
</html>
