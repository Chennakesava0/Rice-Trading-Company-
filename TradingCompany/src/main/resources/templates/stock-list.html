<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Stock List</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">
</head>

<body class="bg-light">

	<div class="container mt-5">

		<!-- Header -->
		<div class="d-flex justify-content-between mb-4">
			<h2 class="text-primary">📦 Stock List</h2>

			<div>
				<a href="/dashboard" class="btn btn-secondary btn-sm">Dashboard</a>
				<a href="/stock/add" class="btn btn-success btn-sm">+ Add Stock</a>
			</div>
		</div>

		<!-- Table -->
		<div class="card shadow">
			<div class="card-body">

				<table class="table table-bordered text-center">
					<thead class="table-dark">
						<tr>
							<th>ID</th>
							<th>Rice</th>
							<th>Bag Size</th>
							<th>Price</th>
							<th>Bags</th>
							<th>Date</th>
							<th>Total</th>
						</tr>
					</thead>

					<tbody>

						<tr th:if="${#lists.isEmpty(stocks)}">
							<td colspan="7" class="text-danger">No stock available</td>
						</tr>

						<tr th:each="stock : ${stocks}">
							<td th:text="${stock.id}"></td>
							<td th:text="${stock.rice.name}"></td>
							<td th:text="${stock.bagSize}"></td>
							<td th:text="${stock.price}"></td>
							<td th:text="${stock.stock}"></td>
							<td th:text="${#temporals.format(stock.stockDate, 'dd-MM-yyyy')}"></td>
							<td th:text="${stock.stock * stock.price}"></td>
						</tr>

					</tbody>
				</table>

				<!-- ✅ PAGINATION (ADD HERE) -->
				<div class="mt-3 d-flex justify-content-center">

					<a th:if="${currentPage > 0}"
						th:href="@{/stock/list(page=${currentPage - 1})}"
						class="btn btn-primary btn-sm me-2"> Previous </a> <span
						class="align-self-center"> Page [[${currentPage + 1}]] of
						[[${totalPages}]] </span> <a th:if="${currentPage < totalPages - 1}"
						th:href="@{/stock/list(page=${currentPage + 1})}"
						class="btn btn-primary btn-sm ms-2"> Next </a>

				</div>

				<!-- Total -->
				<h5 class="text-end mt-3">
					Total Stock Value: ₹ <span th:text="${totalValue}"></span>
				</h5>

			</div>
		</div>

	</div>

</body>
</html>
