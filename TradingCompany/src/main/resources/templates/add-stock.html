<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Stock</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f7fc;
        }

        .card {
            border-radius: 15px;
        }

        .header-title {
            font-weight: 600;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-success header-title">➕ Add Stock</h2>

        <div>
            <a href="/dashboard" class="btn btn-secondary btn-sm">Dashboard</a>
            <a href="/stock/list" class="btn btn-outline-dark btn-sm">Stock List</a>
        </div>
    </div>

    <!-- Form Card -->
    <div class="card shadow col-md-6 mx-auto">
        <div class="card-body">

            <!-- ✅ IMPORTANT: removed th:object -->
            <form th:action="@{/stock/save}" method="post">

                <!-- Rice Dropdown -->
                <div class="mb-3">
                    <label class="form-label">Select Rice</label>
                    <select name="riceId" class="form-control" required>
                        <option value="">-- Select Rice --</option>
                        <option th:each="r : ${riceList}"
                                th:value="${r.id}"
                                th:text="${r.name}">
                        </option>
                    </select>
                </div>

                <!-- Bag Size -->
                <div class="mb-3">
                    <label class="form-label">Bag Size</label>
                    <select name="bagSize" class="form-control" required>
                        <option value="">-- Select Size --</option>
                        <option value="5kg">5 KG</option>
                        <option value="10kg">10 KG</option>
                        <option value="25kg">25 KG</option>
                        <option value="50kg">50 KG</option>
                    </select>
                </div>

                <!-- Price -->
                <div class="mb-3">
                    <label class="form-label">Price per Bag (₹)</label>
                    <input type="number" id="price" name="price"
                           class="form-control" placeholder="Enter price" required>
                </div>

                <!-- Stock -->
                <div class="mb-3">
                    <label class="form-label">Number of Bags</label>
                    <input type="number" id="stock" name="stock"
                           class="form-control" placeholder="Enter quantity" required>
                </div>

                <!-- 🔥 TOTAL PRICE DISPLAY -->
                <div class="mb-3">
                    <label class="form-label">Total Price (₹)</label>
                    <input type="text" id="total"
                           class="form-control bg-light fw-bold text-success" readonly>
                </div>

                <!-- Buttons -->
                <div class="text-center mt-4">
                    <button type="submit" class="btn btn-success px-4">💾 Save Stock</button>
                    <a href="/stock/list" class="btn btn-outline-secondary">Cancel</a>
                </div>

            </form>

        </div>
    </div>

</div>

<!-- 🔥 JAVASCRIPT FOR AUTO CALCULATION -->
<script>

    const priceInput = document.getElementById("price");
    const stockInput = document.getElementById("stock");
    const totalInput = document.getElementById("total");

    function calculateTotal() {
        let price = parseFloat(priceInput.value) || 0;
        let stock = parseInt(stockInput.value) || 0;

        let total = price * stock;

        // Show formatted value
        totalInput.value = "₹ " + total.toFixed(2);
    }

    priceInput.addEventListener("input", calculateTotal);
    stockInput.addEventListener("input", calculateTotal);

</script>

</body>
</html>
