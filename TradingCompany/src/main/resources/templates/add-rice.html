<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Rice</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f7fc;
        }

        .form-card {
            border-radius: 15px;
            padding: 30px;
            background: white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .title {
            font-weight: 600;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-success px-4">
    <span class="navbar-brand">🌾 Rice Trading</span>
    <a href="/dashboard" class="btn btn-light btn-sm">Dashboard</a>
</nav>

<div class="container mt-5">

    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="form-card">

                <h4 class="text-center title mb-4">➕ Add Rice</h4>

                 <form th:action="@{/rice/save}" th:object="${rice}" method="post">

                    <div class="mb-3">
                        <label class="form-label">Rice Name</label>
                        <input type="text" th:field="*{name}" class="form-control" placeholder="Enter rice name" required>
                    </div>

                    

                    <button type="submit" class="btn btn-success w-100">
                        Save Rice
                    </button>

                </form>

            </div>

        </div>
    </div>

</div>

</body>
</html>
