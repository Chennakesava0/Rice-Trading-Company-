<!DOCTYPE html>
<html>
<head>
    <title>Sales List</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-primary">📋 Sales List</h2>

        <div>
            <a href="/dashboard" class="btn btn-secondary btn-sm">
                Dashboard
            </a>

            <a href="/sales/sell" class="btn btn-success btn-sm">
                + New Sale
            </a>
        </div>
    </div>

    <!-- Table -->
    <div class="card shadow">
        <div class="card-body">

            <table class="table table-bordered table-hover text-center">

                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Customer Name</th>
                        <th>Rice</th>
                        <th>Bag Size</th>
                        <th>Bags Sold</th>
                        <th>Total Amount (₹)</th>
                        <th>Payment Status</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody>

                    <tr th:each="sale : ${sales}">

                        <td th:text="${sale.id}"></td>

                        <td th:text="${sale.customerName}"></td>

                        <td th:text="${sale.riceStock.rice.name}"></td>

                        <td th:text="${sale.riceStock.bagSize}"></td>

                        <!-- FIXED -->
                        <td th:text="${sale.bagsSold}"></td>

                        <!-- FIXED -->
                        <td th:text="${sale.totalAmount}"></td>

                        <td>
                            <span th:text="${sale.paymentStatus}"
                                  th:classappend="${sale.paymentStatus == 'PAID'} 
                                  ? 'badge bg-success' 
                                  : 'badge bg-warning text-dark'">
                            </span>
                        </td>

                        <td>

                            <a th:if="${sale.paymentStatus == 'PENDING'}"
                               th:href="@{'/sales/pay/' + ${sale.id}}"
                               class="btn btn-sm btn-success">

                                Mark Paid

                            </a>

                        </td>

                    </tr>

                    <!-- Empty Message -->
                    <tr th:if="${#lists.isEmpty(sales)}">

                        <td colspan="8" class="text-danger">

                            No sales found

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>
    </div>

</div>

</body>
</html>
